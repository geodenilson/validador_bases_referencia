  <path d="M40 70 Q56 64 64 74 T92 70" fill="none" stroke="#27ae60" stroke-width="3"/>
  <!-- Pontos amostrais -->
  <circle cx="50" cy="60" r="3" fill="#e74c3c"/>
  <circle cx="74" cy="58" r="3" fill="#e74c3c"/>
  <circle cx="60" cy="78" r="3" fill="#e74c3c"/>
  <circle cx="82" cy="80" r="3" fill="#e74c3c"/>
  <!-- Check dourado -->
